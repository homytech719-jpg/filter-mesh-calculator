<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>濾網裁切價格模擬器</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .hint { font-size: 13px; color: #888; margin-top: 2px; }
        
        .search-results { 
            position: absolute; width: 100%; max-height: 200px; overflow-y: auto; 
            background: white; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; 
            z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; box-sizing: border-box;
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
        .search-item:hover { background-color: #f0f7ff; color: #007bff; }
        .search-item strong { color: #333; }

        .size-box { border: 2px dashed #007bff; padding: 15px; border-radius: 6px; background-color: #f0f7ff; margin: 20px 0; }
        .size-title { font-weight: bold; color: #007bff; margin-bottom: 10px; font-size: 16px; }
        .result-box { margin-top: 25px; padding: 20px; background-color: #fff9e6; border-left: 5px solid #ffcc00; border-radius: 4px; display: none; }
        .result-title { font-size: 18px; font-weight: bold; color: #b27a00; margin-bottom: 10px; }
        .result-item { margin-bottom: 8px; font-size: 16px; }
        .highlight { font-weight: bold; color: #d9534f; font-size: 20px; }
        .waste-highlight { color: #17a2b8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📐 濾網裁切價格模擬器</h2>
    
    <div class="form-group">
        <label for="codeInput">商品品項編碼：</label>
        <input type="text" id="codeInput" placeholder="輸入編碼（支援模糊搜尋）..." oninput="searchProduct('code')" autocomplete="off">
        <div id="codeSearchResults" class="search-results"></div>
    </div>

    <div class="form-group">
        <label for="nameInput">品項名稱：</label>
        <input type="text" id="nameInput" placeholder="輸入名稱（支援模糊搜尋）..." oninput="searchProduct('name')" autocomplete="off">
        <div id="nameSearchResults" class="search-results"></div>
    </div>

    <div class="form-group">
        <label for="basePriceInput">商品原始 1米1尺 售價：</label>
        <input type="number" id="basePriceInput" placeholder="自動帶出或可自行輸入" oninput="calculate()">
        <div class="hint" id="baseSpecsHint">※ 基準規格：寬 100 cm × 長 30 cm</div>
    </div>

    <div class="size-box">
        <div class="size-title">📋 單片尺寸</div>
        <div class="form-group">
            <label for="lengthInput">請輸入自訂【長度】(cm)：</label>
            <input type="number" id="lengthInput" placeholder="請輸入長度" oninput="calculate()">
        </div>
        <div class="form-group">
            <label for="widthInput">請輸入自訂【寬度】(cm)：</label>
            <input type="number" id="widthInput" value="100" placeholder="預設 100" oninput="calculate()">
        </div>
    </div>

    <div id="resultBox" class="result-box">
        <div class="result-title">📊 試算結果</div>
        <hr style="border: 0; border-top: 1px solid #ffe899; margin-bottom: 10px;">
        <div class="result-item">📐 裁切尺寸：<span id="resSize"></span></div>
        <div class="result-item">💰 試算售價：<span id="resPrice" class="highlight">0</span> 元</div>
        <hr style="border: 0; border-top: 1px dashed #ffe899; margin: 15px 0;">
        <div class="result-item">♻️ 產生廢料尺寸：<span id="resWasteSize"></span></div>
        <div class="result-item">💵 廢料等值金額：<span id="resWastePrice" class="waste-highlight">0</span> 元</div>
    </div>
</div>

<script>
    // 🔒 密碼防護邏輯
    const password = prompt("請輸入內部訪問密碼：");
    if (password !== "719") {
        alert("密碼錯誤，拒絕存取！");
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:red;'>❌ 未授權訪問</h1>";
    }

    let db = [];
    let currentProductBaseWidth = 100; // 預設整卷寬度基準為 100
    const jsonUrl = "data.json";

    // 讀取最新的 data.json 資料庫
    fetch(jsonUrl)
        .then(res => res.json())
        .then(data => { db = data; console.log("資料庫同步成功！"); })
        .catch(err => console.log("讀取資料庫失敗:", err));

    // 自動從品名偵測寬度規格 (支援 120cm, 91cm 等)
    function detectWidthFromProductName(name) {
        let matchedWidth = 100; // 找不到預設就是 100
        const match = name.match(/寬(\d+)cm/);
        if (match && match[1]) {
            matchedWidth = parseInt(match[1]);
        }
        return matchedWidth;
    }

    // 🔍 雙向關鍵字模糊搜尋
    function searchProduct(type) {
        const keyword = document.getElementById(type === 'code' ? "codeInput" : "nameInput").value.trim().toLowerCase();
        const resultsDiv = document.getElementById(type === 'code' ? "codeSearchResults" : "nameSearchResults");
        const otherResultsDiv = document.getElementById(type === 'code' ? "nameSearchResults" : "codeSearchResults");
        
        otherResultsDiv.style.display = "none";

        if (keyword === "") {
            resultsDiv.style.display = "none";
            return;
        }

        const matches = db.filter(item => 
            item.code.toLowerCase().includes(keyword) || 
            item.name.toLowerCase().includes(keyword)
        );

        if (matches.length > 0) {
            resultsDiv.innerHTML = "";
            matches.forEach(item => {
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerHTML = `<strong>${item.code}</strong><br><small style="color:#666;">${item.name}</small>`;
                
                div.onclick = function() {
                    document.getElementById("codeInput").value = item.code;
                    document.getElementById("nameInput").value = item.name;
                    document.getElementById("basePriceInput").value = item.price;
                    
                    // ✨ 核心升級：自動偵測該品項的原始寬度
                    currentProductBaseWidth = detectWidthFromProductName(item.name);
                    
                    // ✨ 同步修改預設寬度輸入框的值，並更新提示字
                    document.getElementById("widthInput").value = currentProductBaseWidth;
                    document.getElementById("baseSpecsHint").innerText = `※ 基準規格：寬 ${currentProductBaseWidth} cm × 長 30 cm`;
                    
                    resultsDiv.style.display = "none";
                    calculate();
                };
                resultsDiv.appendChild(div);
            });
            resultsDiv.style.display = "block";
        } else {
            resultsDiv.style.display = "none";
        }
    }

    document.addEventListener("click", function(e) {
        if (e.target.id !== "codeInput" && e.target.id !== "nameInput") {
            document.getElementById("codeSearchResults").style.display = "none";
            document.getElementById("nameSearchResults").style.display = "none";
        }
    });

    // 計算邏輯
    function calculate() {
        const basePrice = parseFloat(document.getElementById("basePriceInput").value);
        const length = parseFloat(document.getElementById("lengthInput").value);
        let width = parseFloat(document.getElementById("widthInput").value);
        const resultBox = document.getElementById("resultBox");

        if (!basePrice || !length || length <= 0) {
            resultBox.style.display = "none";
            return;
        }

        // 如果手動改掉售價或寬度，且當前沒有選定產品，則使用欄位當前值
        if (isNaN(width) || width <= 0) width = currentProductBaseWidth;

        const baseWidth = currentProductBaseWidth; // 使用自動偵測到的基準寬度 (100, 120 或 91)
        const baseLength = 30; // 固定 1 尺 = 30cm

        // 寬度限制警告
        if (width > baseWidth) {
            alert(`⚠️ 輸入寬度 (${width}cm) 不能大於該產品原始整卷寬度 (${baseWidth}cm)！`);
            document.getElementById("widthInput").value = baseWidth;
            width = baseWidth;
        }

        // 比例計算
        const lengthRatio = length / baseLength;
        const widthRatio = width / baseWidth;
        const finalPrice = Math.round(basePrice * lengthRatio * widthRatio);

        // 廢料計算
        const wasteWidth = baseWidth - width;
        let wasteText = "無廢料 (寬度剛好用完)";
        let wastePriceText = "0";

        if (wasteWidth > 0) {
            const wasteWidthRatio = wasteWidth / baseWidth;
            const wastePrice = Math.round(basePrice * lengthRatio * wasteWidthRatio);
            wasteText = `${wasteWidth} cm × ${length} cm`;
            wastePriceText = wastePrice;
        }

        document.getElementById("resSize").innerText = `${width} cm × ${length} cm`;
        document.getElementById("resPrice").innerText = finalPrice;
        document.getElementById("resWasteSize").innerText = wasteText;
        document.getElementById("resWastePrice").innerText = wastePriceText;
        resultBox.style.display = "block";
    }
</script>

</body>
</html>
